esphome:
  name: duke3d-matrix
  friendly_name: Duke3D Matrix

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  partitions: partitions.csv
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

external_components:
  - source:
      type: local
      path: components
    components: [hub75_matrix, hud, sd_card, duke3d]

hub75_matrix:
  id: matrix_display

hud:
  id: hud_display

# Replace A0-A5 pad numbers with actual GPIO numbers from Adafruit Matrix Portal S3 schematic
duke3d:
  id: game_engine

sd_card:
  id: sdcard
  mosi_pin: 1   # A0 — verify from schematic
  miso_pin: 2   # A1
  clk_pin:  3   # A2
  cs_pin:   4   # A3

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Duke3D Fallback AP"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  baud_rate: 115200

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lambda: |-
            auto t = id(ha_time)->now();
            id(hud_display)->set_time(t.hour, t.minute);
    # Update clock every second so it actually ticks (on_time_sync fires only once at sync)
    on_time:
      - seconds: 0-59    # fires every second
        then:
          - lambda: |-
              auto t = id(ha_time)->now();
              if (t.is_valid())
                id(hud_display)->set_time(t.hour, t.minute);

sensor:
  - platform: homeassistant
    id: weather_temperature
    entity_id: sensor.weather_temperature
    on_value:
      then:
        - lambda: id(hud_display)->set_temperature(x);

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: sensor.weather_condition
    on_value:
      then:
        - lambda: id(hud_display)->set_condition(std::string(x.c_str()));
  - platform: template
    id: duke3d_demo
    name: "Duke3D Current Demo"
    lambda: return std::string(id(game_engine)->current_demo());
    update_interval: 10s
