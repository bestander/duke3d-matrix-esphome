substitutions:
  # Xbox Wireless Controller (BLE): VID 0x045E PID 0x02FD, HID ACL. Pair on the console/PC first if needed.
  ble_gamepad_mac: "83:25:03:36:47:6B"

esphome:
  name: duke3d-matrix
  friendly_name: Duke3D Matrix
  platformio_options:
    # Hub75 library: added as lib_dep so PlatformIO compiles its sources.
    # build_flags exposes its headers to all compilation units since the
    # monolithic src/ component has no per-component REQUIRES resolution.
    extra_scripts:
      - pre:/Users/konstantinraev/work/duke3d-matrix-esphome/pre_build.py
    lib_deps:
      - symlink:///Users/konstantinraev/work/duke3d-matrix-esphome/libs/ESP32-HUB75-MatrixPanel-I2S-DMA
    build_flags:
      # Log /sdcard read opens (sd_open_trace.c __wrap__open_r); pair with sd_card open_trace: true
      - -Wl,--wrap=_open_r
      - -I/Users/konstantinraev/work/duke3d-matrix-esphome/libs/ESP32-HUB75-MatrixPanel-I2S-DMA/src
      # Duke engine includes (for platform.h -> esp32_compat.h)
      - -I/Users/konstantinraev/work/duke3d-matrix-esphome/components/duke3d
      - -I/Users/konstantinraev/work/duke3d-matrix-esphome/components/duke3d/engine/components/SDL
      # Hub75 ESP-IDF mode: disable Adafruit GFX dependency (CMakeLists sets this
      # via target_compile_options but PlatformIO doesn't run that CMakeLists).
      - -DNO_GFX

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  partitions: partitions.csv
  framework:
    type: esp-idf
    version: "5.2.1"
    platform_version: "file:///Users/konstantinraev/.platformio/platforms/espressif32"
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      # Match the Arduino qio_opi config that boots successfully on this hardware:
      # - 240MHz CPU (Arduino default; 160MHz triggers a ROM bug in rtc_clk_init)
      # - UART primary console + USB JTAG secondary (USB JTAG primary crashes before output)
      # - PSRAM enabled with IGNORE_NOTFOUND so a PSRAM init failure is non-fatal
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP_CONSOLE_UART_DEFAULT: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_USB_SERIAL_JTAG: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_QUAD: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_SPIRAM_BOOT_INIT: "y"
      CONFIG_SPIRAM_IGNORE_NOTFOUND: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      # Pool for DMA-only and internal-only allocators (SDMMC, etc.). Do not starve this.
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      # Pool kept in internal RAM for DMA-only allocators (SDMMC, etc.). Do not use
      # CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP here — it frees WiFi buffers to SPIRAM but
      # starves internal heap and breaks esp_dma_malloc for SD + WiFi ("m f null").
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      # Allow EXT_RAM_ATTR BSS variables (hittype 288KB, sprite 176KB, pvWalls 72KB, etc.)
      # to be placed in PSRAM BSS segment instead of internal DRAM.
      # Without this, the engine arrays overflow internal DRAM by ~1.6MB.
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"
      # BLE: host stack can use PSRAM first so internal DRAM stays available for BT controller + DMA.
      # Do NOT set CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP — it breaks SDMMC (esp_dma_malloc) and WiFi.
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      # Trim WiFi RX buffers slightly to free internal RAM for BT+SD coexistence (defaults are higher).
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "24"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      # Extend interrupt watchdog timeout — E4L11 level load takes up to 15s of
      # sequential SD card reads during docacheit(); default 300ms is far too short.
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "15000"
      # FatFs: max wait to acquire file/volume mutex. Under heavy concurrent SD
      # (game + streaming prefetch), the default 10s can still surface as errno 116
      # (ETIMEDOUT) on fseek/fread; bump if logs show prefetch fseek/read failures.
      CONFIG_FATFS_TIMEOUT_MS: "30000"

external_components:
  - source:
      type: local
      path: components
    components: [hub75_matrix, hud, sd_card, duke3d, i2s_audio]

hub75_matrix:
  id: matrix_display
  # Boot splash: only from SD — /sdcard/duke3d/LOADSCR.RGB (GRP LOADSCREEN 3281 + PALETTE.DAT, Hub75 setup).
  # Do not embed splash_image here or compiled PNG wins over SD whenever cache is missing.

hud:
  id: hud_display

duke3d:
  id: game_engine
  # I2S output scale: 0 = mute, 100 = full mixer level (default 50 ≈ previous half-volume trim).
  audio_output_percent: 10
  # Wait for HA time sync before stopping WiFi at boot; otherwise clock stays 00:00 and sensors may not arrive.
  time_id: ha_time
  smoke_test: false
  usb_gamepad: false   # false = keep USB as JTAG/CDC debug interface
  # tile_cache: pre-extracts ≤128px tiles from DUKE3D.GRP into TCACHE.BIN on SD (one-time build).
  # At runtime loadtile() reads that flat file instead of seeking inside GRP/ART — fewer SD hits,
  # less stutter. Extra PSRAM helps engine heaps (Initcache); this is separate I/O optimization.
  tile_cache: false
  pause_wifi: true
  # Minimum seconds after WiFi associates; bootstrap also waits for time_id to be valid (unless 120s cap).
  wifi_bootstrap_grace_s: 8
  # Do not start WiFi during gameplay for HA refresh — avoids SPI/SD contention with streamed audio/tiles.
  wifi_ha_sync: false
  # Min seconds between HA WiFi syncs triggered by non-demo level loads (debounce).
  wifi_sync_min_interval_s: 90

# Matrix Portal S3 GPIO strip: A1=GPIO3, A2=GPIO9, A3=GPIO10, A4=GPIO11, TX=GPIO18, RX=GPIO8
# JST 3-pin connector: A0=GPIO12
# SD card (SPI) uses A1-A3 + JST A0 for CS.
# I2S amp uses A4 + RX + TX. TX/RX are safe to repurpose — logging uses USB JTAG, not UART.
i2s_audio:
  id: amp
  bclk_pin:  12   # A0 (JST connector)
  lrclk_pin: 8    # RX
  din_pin:   18   # TX

sd_card:
  id: sdcarddp 
  mosi_pin: 3    # A1
  miso_pin: 9    # A2
  clk_pin:  10   # A3
  cs_pin:   11   # A4
  benchmark: true  # logs sequential + random SD read stats once at boot (uses duke3d/DUKE3D.GRP)
  open_trace: true   # set true: log every read-capable open under /sdcard (tag sd_open); very noisy

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Duke3D Fallback AP"
    password: !secret ap_password

# BLE HID gamepad — connects to fixed MAC, logs decoded buttons from HID Report notifications.
# Standard GATT: Human Interface Device 0x1812, Report 0x2A4D. If your controller uses a
# vendor-specific characteristic, use nRF Connect to copy service/UUID into the sensor below.
esp32_ble:
  id: esp32_ble_hub

esp32_ble_tracker:
  ble_id: esp32_ble_hub

ble_client:
  - mac_address: ${ble_gamepad_mac}
    id: ble_gamepad
    on_connect:
      - lambda: |-
          ESP_LOGI("ble_gamepad", "Connected: %s", id(ble_gamepad)->address_str().c_str());
          id(hud_display)->set_ble_connected(true);
    on_disconnect:
      - lambda: |-
          ESP_LOGW("ble_gamepad", "Disconnected");
          id(hud_display)->set_ble_connected(false);
    # Uncomment if pairing asks for a 6-digit passkey (set the number your controller shows).
    # on_passkey_notification:
    #   - then:
    #       - logger.log:
    #           format: "BLE passkey to enter on controller: %u"
    #           args: ["passkey"]
    # on_passkey_request:
    #   - ble_client.passkey_reply:
    #       id: ble_gamepad
    #       passkey: 123456

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG
  baud_rate: 115200
  logs:
    hub75: DEBUG
    S3: DEBUG
    wifi: WARN
    wifi_esp32: WARN
    esp32_ble: WARN
    ble_sensor: INFO
    ble_hid: INFO
    ble_gamepad: INFO

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lambda: |-
            auto t = id(ha_time)->now();
            id(hud_display)->set_time(t.hour, t.minute);
    # Update clock every second so it actually ticks (on_time_sync fires only once at sync)
    on_time:
      - seconds: 0-59    # fires every second
        then:
          - lambda: |-
              auto t = id(ha_time)->now();
              if (t.is_valid())
                id(hud_display)->set_time(t.hour, t.minute);

sensor:
  # BLE HID: notifications on standard Report characteristic (same layout as usb_gamepad.h defaults).
  - platform: ble_client
    type: characteristic
    ble_client_id: ble_gamepad
    name: "BLE HID report"
    id: ble_hid_report_sensor
    internal: true
    service_uuid: "1812"
    characteristic_uuid: "2A4D"
    notify: true
    update_interval: never
    lambda: |-
      static const char *const TAG = "ble_hid";
      std::string hex;
      hex.reserve(x.size() * 3);
      for (const uint8_t b : x) {
        char buf[4];
        snprintf(buf, sizeof(buf), "%02X ", b);
        hex += buf;
      }
      ESP_LOGI(TAG, "raw (%zu B): %s", x.size(), hex.c_str());
      if (x.size() < 6) {
        return NAN;
      }
      size_t o = 0;
      if (x.size() >= 7 && x[0] != 0 && x[0] < 32) {
        o = 1;
      }
      if (x.size() < o + 6) {
        return NAN;
      }
      const uint8_t ax = x[o + 0];
      const uint8_t ay = x[o + 1];
      const uint8_t b0 = x[o + 4];
      const uint8_t b1 = x[o + 5];
      const bool dead_lo = ax < 64;
      const bool dead_hi = ax > 192;
      const bool dead_lo_y = ay < 64;
      const bool dead_hi_y = ay > 192;
      std::string pressed;
      if (dead_lo_y) pressed += "forward ";
      if (dead_hi_y) pressed += "back ";
      if (dead_lo) pressed += "turn_left ";
      if (dead_hi) pressed += "turn_right ";
      if (b0 & (1 << 0)) pressed += "fire ";
      if (b0 & (1 << 1)) pressed += "use ";
      if (b0 & (1 << 2)) pressed += "map ";
      if (b0 & (1 << 4)) pressed += "strafe_left ";
      if (b0 & (1 << 5)) pressed += "strafe_right ";
      if (b1 & (1 << 1)) pressed += "menu ";
      if (!pressed.empty()) {
        ESP_LOGI(TAG, "buttons: %s", pressed.c_str());
      }
      return (float) b0;
  # 8-hour air temperature forecast min/max — adjust entity IDs to match your HA setup
  - platform: homeassistant
    id: temp_min_8h
    entity_id: sensor.outdoor_temperature_low
    on_value:
      then:
        - lambda: id(hud_display)->set_min_temp(x);
  - platform: homeassistant
    id: temp_max_8h
    entity_id: sensor.outdoor_temperature_high
    on_value:
      then:
        - lambda: id(hud_display)->set_max_temp(x);
  - platform: homeassistant
    id: water_temperature
    entity_id: sensor.water_temperature
    on_value:
      then:
        - lambda: id(hud_display)->set_water_temp(x);

text_sensor:
  # Tide times from HA — format "HH:MM"; adjust entity IDs to match your HA setup
  - platform: homeassistant
    id: tide_high_time
    entity_id: sensor.high_tide_time
    on_value:
      then:
        - lambda: id(hud_display)->set_tide_high(std::string(x.c_str()));
  - platform: homeassistant
    id: tide_low_time
    entity_id: sensor.low_tide_time
    on_value:
      then:
        - lambda: id(hud_display)->set_tide_low(std::string(x.c_str()));
  - platform: template
    id: hub75_status
    name: "Hub75 Init Status"
    lambda: return std::string(esphome::hub75_matrix::hub75_init_status);
    update_interval: 5s
